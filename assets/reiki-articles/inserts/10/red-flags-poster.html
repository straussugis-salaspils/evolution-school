<figure class="reiki-red-flags" aria-labelledby="reiki-red-flags-title" aria-describedby="reiki-red-flags-desc">

    <p class="reiki-red-flags__intro" id="reiki-red-flags-desc">Опасным бывает не только обещание. Важно, как Мастер отвечает на вопросы, относится к согласию и оставляет ли человеку право выбирать.</p>

    <li>Предлагает отказаться от врача, лекарства или психотерапии.</li>
    <li>Ставит диагноз по энергии.</li>

    <li>Прикасается без согласия или не принимает слово «стоп».</li>
    <li>Пугает потерей защиты или силы.</li>
    <li>Делает каждую следующую ступень обязательной.</li>
