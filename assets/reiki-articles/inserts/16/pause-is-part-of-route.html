<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Пауза как часть маршрута к следующей ступени Рейки</title>
  <style>
    :root {
      --paper: #fffdf8;
      --cream: #f8f0dc;
      --ink: #292319;
      --muted: #6d6559;
      --gold: #b78a3e;
      --deep: #76551f;
      --teal: #315f5b;
      --clay: #9a5f48;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--paper); }

    .pause-route {
      width: 100%;
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(118, 85, 31, .22);
      border-radius: 30px;
      background: linear-gradient(145deg, var(--paper), var(--cream));
      color: var(--ink);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
    }

    .pause-route__intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, .48fr);
      gap: 26px;
      align-items: end;
      padding: clamp(24px, 5vw, 44px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--deep);
      font:800 12px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 650px;
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 500;
      line-height: 1.02;
      text-wrap: balance;
    }

    .intro-note {
      margin: 0;
      color: var(--muted);
      font:16px/1.55 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .route-stage {
      position: relative;
      margin: 0 clamp(20px, 5vw, 44px);
      overflow: hidden;
      border-radius: 24px;
      background:
        radial-gradient(circle at 52% 43%, rgba(183, 138, 62, .17), transparent 23%),
        #eaf0e9;
    }

    .route-stage svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .route-stops {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      margin: 20px clamp(20px, 5vw, 44px) 0;
      overflow: hidden;
      border: 1px solid rgba(118, 85, 31, .18);
      border-radius: 18px;
      background: rgba(118, 85, 31, .18);
    }

    .route-stop {
      padding: 18px 20px;
      background: rgba(255, 253, 248, .95);
    }

    .route-stop--pause {
      background: #f7efdc;
    }

    .route-stop span {
      display: block;
      color: var(--deep);
      font:800 11px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .route-stop strong {
      display: block;
      margin-top: 5px;
      font-size: 22px;
      font-weight: 500;
      line-height: 1.08;
    }

    .route-stop p {
      margin: 7px 0 0;
      color: var(--muted);
      font:14px/1.48 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    figcaption {
      padding: 22px clamp(24px, 5vw, 44px) 27px;
      color: var(--teal);
      font:16px/1.55 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    @media (max-width: 680px) {
      .pause-route { border-radius: 24px; }
      .pause-route__intro { grid-template-columns: 1fr; gap: 13px; }
      .route-stage { margin-inline: 14px; border-radius: 18px; }
      .route-stops {
        grid-template-columns: 1fr;
        margin-inline: 14px;
      }
      .route-stop { padding: 17px 18px; }
    }
  </style>
</head>
<body>
  <figure class="pause-route" role="group" aria-labelledby="pause-route-title" aria-describedby="pause-route-caption">
    <header class="pause-route__intro">
      <div>
        <p class="eyebrow">Пауза — не закрытая дверь</p>
        <h1 id="pause-route-title">Можно остановиться и остаться на маршруте.</h1>
      </div>
      <p class="intro-note">Неуверенность не требует немедленного «да» или окончательного «нет».</p>
    </header>

    <div class="route-stage" aria-hidden="true">
      <svg viewBox="0 0 920 330">
        <path d="M52 172C190 70 286 86 366 164C421 219 474 224 531 168C618 82 717 91 868 170" fill="none" stroke="#fffdf8" stroke-linecap="round" stroke-width="40"/>
        <path d="M52 172C190 70 286 86 366 164C421 219 474 224 531 168C618 82 717 91 868 170" fill="none" stroke="#315f5b" stroke-dasharray="5 18" stroke-linecap="round" stroke-width="7"/>
        <path d="M403 192C398 272 487 290 527 220" fill="none" stroke="#fffdf8" stroke-linecap="round" stroke-width="36"/>
        <path d="M403 192C398 272 487 290 527 220" fill="none" stroke="#b78a3e" stroke-dasharray="4 15" stroke-linecap="round" stroke-width="7"/>
        <circle cx="52" cy="172" r="22" fill="#fffdf8" stroke="#315f5b" stroke-width="5"/>
        <circle cx="459" cy="263" r="31" fill="#fffdf8" stroke="#b78a3e" stroke-width="5"/>
        <path d="M445 263h28" stroke="#b78a3e" stroke-linecap="round" stroke-width="5"/>
        <circle cx="868" cy="170" r="22" fill="#fffdf8" stroke="#315f5b" stroke-width="5"/>
        <path d="M868 117v-52M868 66l54 24-54 24" fill="none" stroke="#9a5f48" stroke-linecap="round" stroke-linejoin="round" stroke-width="7"/>
      </svg>
    </div>

    <div class="route-stops">
      <section class="route-stop">
        <span>Сейчас</span>
        <strong>Продолжать Рейки II</strong>
        <p>Посмотреть, чем вы действительно пользуетесь и что уже стало вашей практикой.</p>
      </section>
      <section class="route-stop route-stop--pause">
        <span>Допустимая остановка</span>
        <strong>Взять паузу</strong>
        <p>Перечитать материалы, собрать вопросы и не принимать решение под давлением.</p>
      </section>
      <section class="route-stop">
        <span>Когда появится ясность</span>
        <strong>Вернуться к разговору</strong>
        <p>Обсудить следующий шаг с Мастером, не превращая паузу в экзамен или отказ.</p>
      </section>
    </div>

    <figcaption id="pause-route-caption"><strong>Пауза меняет темп, а не ценность человека.</strong> К разговору можно вернуться, когда появится живая задача для следующего этапа.</figcaption>
  </figure>
</body>
</html>
