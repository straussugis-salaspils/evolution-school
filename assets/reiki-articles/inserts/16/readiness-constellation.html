<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ориентиры готовности к Подмастерью</title>
  <style>
    .eh-insert-preview {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: #172a27;
      color: #f8f3e8;
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .eh16constellation,
    .eh16constellation * {
      box-sizing: border-box;
    }

    .eh16constellation {
      --night: #203632;
      --line: #9cb3a4;
      --star: #d7a36f;
      position: relative;
      width: min(100%, 760px);
      max-width: calc(100vw - 32px);
      height: 760px;
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(238, 231, 215, .22);
      border-radius: 48% 52% 44% 56% / 15% 18% 12% 16%;
      background:
        radial-gradient(circle at 23% 20%, rgba(215, 163, 111, .12), transparent 22%),
        radial-gradient(circle at 78% 74%, rgba(156, 179, 164, .11), transparent 27%),
        var(--night);
    }

    .eh16constellation__heading {
      position: absolute;
      z-index: 2;
      top: 30px;
      left: 50%;
      width: min(88%, 570px);
      margin: 0;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(29px, 5vw, 41px);
      font-weight: 500;
      line-height: 1;
      color: #f8f3e8 !important;
      text-align: center;
      transform: translateX(-50%);
    }

    .eh16constellation__sky {
      position: absolute;
      inset: 160px 20px 100px;
    }

    .eh16constellation__sky svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .eh16constellation__sky line,
    .eh16constellation__sky ellipse {
      fill: none;
      stroke: var(--line);
      stroke-width: 1;
      opacity: .58;
      vector-effect: non-scaling-stroke;
    }

    .eh16constellation__sky ellipse {
      stroke-dasharray: 5 7;
      opacity: .38;
    }

    .eh16constellation__center {
      position: absolute;
      z-index: 2;
      top: 50%;
      left: 50%;
      display: grid;
      place-items: center;
      width: 178px;
      aspect-ratio: 1;
      padding: 24px;
      border: 1px solid var(--star);
      border-radius: 50%;
      background: #f5ecdc;
      color: var(--night);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 22px;
      line-height: 1.05;
      text-align: center;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 12px rgba(215, 163, 111, .06);
    }

    .eh16constellation__not-exam {
      position: absolute;
      top: calc(50% + 91px);
      left: 50%;
      z-index: 3;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--star);
      color: #1e312e;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .11em;
      text-transform: uppercase;
      transform: translateX(-50%);
    }

    .eh16constellation__points {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .eh16constellation__point {
      position: absolute;
      z-index: 2;
      width: 175px;
      color: #f8f3e8;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 17px;
      line-height: 1.15;
    }

    .eh16constellation__point::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 8px;
      border-radius: 50%;
      background: var(--star);
      box-shadow: 0 0 0 5px rgba(215, 163, 111, .1);
      vertical-align: .06em;
    }

    .eh16constellation__point--a { top: 3%; left: 7%; }
    .eh16constellation__point--b { top: 6%; right: 4%; }
    .eh16constellation__point--c { top: 43%; left: 0; }
    .eh16constellation__point--d { top: 45%; right: 0; }
    .eh16constellation__point--e { bottom: 5%; left: 10%; }
    .eh16constellation__point--f { right: 7%; bottom: 3%; }

    .eh16constellation__pause {
      position: absolute;
      z-index: 3;
      left: 50%;
      bottom: 22px;
      width: min(70%, 460px);
      margin: 0;
      padding-top: 10px;
      border-top: 1px dashed rgba(156, 179, 164, .55);
      color: #c9d4cd;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
      transform: translateX(-50%);
    }

    .eh16constellation__pause strong {
      color: var(--star);
    }

    .eh16constellation__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 620px) {
      .eh16constellation {
        height: auto;
        padding: 28px 22px 30px;
        border-radius: 34px 34px 18px 18px;
      }

      .eh16constellation__heading {
        position: static;
        width: auto;
        transform: none;
      }

      .eh16constellation__sky {
        position: relative;
        inset: auto;
        display: flex;
        flex-direction: column;
        margin-top: 26px;
      }

      .eh16constellation__sky svg {
        inset: 0;
        opacity: .45;
      }

      .eh16constellation__center {
        position: relative;
        top: auto;
        left: auto;
        width: 150px;
        margin: 0 auto 58px;
        transform: none;
      }

      .eh16constellation__not-exam {
        top: 146px;
      }

      .eh16constellation__points {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 22px 16px;
      }

      .eh16constellation__point {
        position: static;
        width: auto;
        font-size: 15px;
      }

      .eh16constellation__point::before {
        display: block;
        margin: 0 0 9px;
      }

      .eh16constellation__pause {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        width: auto;
        margin: 30px 0 0;
        padding-top: 16px;
        border-top: 1px dashed rgba(156, 179, 164, .55);
        text-align: left;
        transform: none;
      }
    }
  </style>
</head>
<body class="eh-insert-preview">
  <figure class="eh16constellation" role="img" aria-labelledby="eh16constellation-title" aria-describedby="eh16constellation-desc">
    <h2 class="eh16constellation__heading" id="eh16constellation-title">Шесть ориентиров сходятся не в допуске, а в разговоре</h2>

    <div class="eh16constellation__sky">
      <svg viewBox="0 0 720 530" aria-hidden="true" focusable="false">
        <ellipse cx="360" cy="245" rx="285" ry="205"></ellipse>
        <ellipse cx="360" cy="245" rx="330" ry="240"></ellipse>
        <line x1="360" y1="245" x2="125" y2="52"></line>
        <line x1="360" y1="245" x2="600" y2="65"></line>
        <line x1="360" y1="245" x2="52" y2="250"></line>
        <line x1="360" y1="245" x2="670" y2="262"></line>
        <line x1="360" y1="245" x2="145" y2="470"></line>
        <line x1="360" y1="245" x2="600" y2="475"></line>
      </svg>

      <div class="eh16constellation__center">Разговор с Мастером</div>
      <span class="eh16constellation__not-exam">не экзамен</span>

      <ul class="eh16constellation__points" id="eh16constellation-desc">
        <li class="eh16constellation__point eh16constellation__point--a">Практика живёт сейчас</li>
        <li class="eh16constellation__point eh16constellation__point--b">Понятно, зачем идти дальше</li>
        <li class="eh16constellation__point eh16constellation__point--c">Есть самостоятельность</li>
        <li class="eh16constellation__point eh16constellation__point--d">Есть рабочая связь</li>
        <li class="eh16constellation__point eh16constellation__point--e">Готовность к Подмастерью</li>
        <li class="eh16constellation__point eh16constellation__point--f">Можно услышать «пока рано»</li>
      </ul>
    </div>

    <p class="eh16constellation__pause"><strong>Спокойная орбита:</strong> пауза не означает отказ и не определяет ценность человека.</p>
    <figcaption class="eh16constellation__sr">Созвездие шести ориентиров вокруг разговора с Мастером. Центр помечен как не экзамен, а отдельная внешняя орбита объясняет, что пауза не означает отказ.</figcaption>
  </figure>
</body>
</html>
