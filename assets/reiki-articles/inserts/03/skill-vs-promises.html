<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Навык и границы обещаний первой ступени Рейки</title>
<style>

#eh-r03 .split{display:grid;grid-template-columns:1fr 1fr;min-height:430px}#eh-r03 .side{position:relative;padding:38px clamp(24px,5cqw,48px)}#eh-r03 .skill{background:#e6eee8}#eh-r03 .limits{background:#f2e7df}#eh-r03 .skill:after{position:absolute;top:0;right:-26px;bottom:0;width:52px;background:linear-gradient(135deg,#e6eee8 49%,transparent 50%);content:"";z-index:2}#eh-r03 .symbol{height:100px;margin-bottom:22px}#eh-r03 svg{display:block;width:150px;height:100px}#eh-r03 h4{margin:0 0 15px;font-size:27px;font-weight:500;line-height:1.08}#eh-r03 p{margin:0;color:var(--muted);font:15px/1.5 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}#eh-r03 .lines{display:grid;gap:13px;margin-top:22px}#eh-r03 .line{position:relative;padding-left:25px;font:600 14px/1.4 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}#eh-r03 .line:before{position:absolute;top:.5em;left:0;width:14px;height:2px;background:var(--gold);content:""}#eh-r03 .skill .line:before{background:var(--teal)}#eh-r03 figcaption{padding:20px clamp(22px,5cqw,46px);border-top:1px solid #76551f33;color:var(--deep);font:15px/1.5 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}

</head><body style="margin:0;padding:12px;background:#fffdf8">
<figure id="eh-r03" role="group" aria-labelledby="r03-title" aria-describedby="r03-caption"><header><p class="k">Первая ступень · ясная граница</p><h3 id="r03-title">Навык, который можно практиковать. Не обещание идеальной жизни.</h3></header>
<div class="split">
<section class="side skill" aria-labelledby="r03-skill"><div class="symbol" aria-hidden="true"><svg viewBox="0 0 150 100"><circle cx="52" cy="48" r="35" fill="#fffdf8"/><path d="M20 66c21-4 27-18 30-38M86 70c-19-5-25-19-27-42" fill="none" stroke="#315f5b" stroke-width="8" stroke-linecap="round"/><circle cx="112" cy="48" r="23" fill="#b78a3e"/><path d="M98 49h28M112 35v28" stroke="#fffdf8" stroke-width="5" stroke-linecap="round"/></svg></div><h4 id="r03-skill">Что действительно формируется</h4><p>Понятная последовательность самопрактики, которую человек осваивает на обучении и затем использует сам.</p><div class="lines"><span class="line">знать, как провести полный или подтверждённый короткий сеанс;</span><span class="line">замечать собственный опыт без обязательного «правильного» ощущения;</span><span class="line">возвращаться к материалам и задавать Мастеру конкретные вопросы.</span></div></section>
<section class="side limits" aria-labelledby="r03-limits"><div class="symbol" aria-hidden="true"><svg viewBox="0 0 150 100"><path d="M16 72C29 22 112 12 134 64" fill="none" stroke="#9a5f48" stroke-dasharray="4 11" stroke-linecap="round" stroke-width="5"/><path d="M29 28l91 51" stroke="#9a5f48" stroke-width="8" stroke-linecap="round"/><circle cx="40" cy="71" r="13" fill="#d9b7a7"/><circle cx="112" cy="31" r="13" fill="#d9b7a7"/></svg></div><h4 id="r03-limits">Чего первая ступень не обещает</h4><p>Она не делает человека неуязвимым и не отменяет обычную помощь, решения и ответственность за свою жизнь.</p><div class="lines"><span class="line">не гарантирует постоянное спокойствие, яркие ощущения или одинаковый результат;</span><span class="line">не заменяет врача, психолога или назначенное лечение;</span><span class="line">не превращает следующий этап обучения в автоматическую обязанность.</span></div></section>
</div><figcaption id="r03-caption"><strong>Хорошая граница не обесценивает практику.</strong> Она помогает увидеть её реальный масштаб: изученный инструмент, а не обещание решить всё сразу.</figcaption></figure>
</body></html>
