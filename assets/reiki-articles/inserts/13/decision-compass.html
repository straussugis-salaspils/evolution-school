<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Пилот 13B — компас выбора после Рейки II</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fffdf8;
      --cream: #f8f0dc;
      --ink: #292319;
      --muted: #6d6559;
      --gold: #b78a3e;
      --gold-deep: #76551f;
      --teal: #315f5b;
      --clay: #9a5f48;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--paper);
      color: var(--ink);
      font-family:var(--viz-font-display, Georgia, "Times New Roman", serif);
    }

    main {
      width: min(1080px, calc(100% - 24px));
      margin: 0 auto;
      padding: clamp(24px, 5vw, 64px) 0;
    }

    .choice-compass {
      margin: 0;
      padding: clamp(22px, 4vw, 48px);
      border-radius: clamp(24px, 4vw, 42px);
      background:
        radial-gradient(circle at 50% 46%, rgba(183, 138, 62, .11), transparent 39%),
        var(--cream);
      box-shadow: inset 0 0 0 1px rgba(118, 85, 31, .22);
    }

    .intro {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold-deep);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4.8vw, 58px);
      font-weight: 500;
      line-height: 1;
      text-wrap: balance;
    }

    .lead {
      max-width: 720px;
      margin: 16px auto 0;
      color: var(--muted);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: clamp(15px, 1.8vw, 19px);
      line-height: 1.55;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      margin-top: clamp(18px, 3vw, 30px);
    }

    .sector-title {
      fill: var(--ink);
      font-family:var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 28px;
      font-weight: 700;
    }

    .sector-copy {
      fill: var(--muted);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: 18px;
    }

    .sector-kicker {
      fill: var(--gold-deep);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1.4px;
    }

    .connector {
      fill: none;
      stroke: var(--gold-deep);
      stroke-linecap: round;
      stroke-width: 2.5;
    }

    figcaption {
      max-width: 820px;
      margin: 0 auto;
      padding-top: 20px;
      border-top: 1px solid rgba(118, 85, 31, .22);
      color: var(--gold-deep);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.5;
      text-align: center;
    }

    .compass-mobile {
      display: none;
    }

    @media (max-width: 620px) {
      main { width: min(100% - 16px, 520px); }
      .choice-compass { padding: 24px 14px; }
      .intro { padding: 0 8px; }
      .choice-compass > svg { display: none; }
      .compass-mobile {
        display: grid;
        gap: 10px;
        margin: 26px 0 22px;
      }
      .compass-mobile__centre {
        display: grid;
        width: 132px;
        min-height: 132px;
        place-items: center;
        justify-self: center;
        padding: 18px;
        border: 10px solid rgba(183, 138, 62, .18);
        border-radius: 50%;
        background: var(--teal);
        color: var(--paper);
        font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
        font-size: 18px;
        line-height: 1.16;
        text-align: center;
      }
      .compass-mobile__route {
        display: grid;
        gap: 3px;
        padding: 16px 17px;
        border-left: 4px solid var(--route-accent);
        border-radius: 0 16px 16px 0;
        background: color-mix(in srgb, var(--route-accent) 10%, var(--paper));
      }
      .compass-mobile__route small {
        color: var(--gold-deep);
        font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: .09em;
        text-transform: uppercase;
      }
      .compass-mobile__route strong {
        color: var(--ink);
        font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
        font-size: 21px;
        font-weight: 500;
        line-height: 1.14;
      }
      .compass-mobile__route span {
        color: var(--muted);
        font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
        font-size: 15px;
        line-height: 1.45;
      }
      .compass-mobile__route--one { --route-accent: var(--teal); }
      .compass-mobile__route--two { --route-accent: var(--gold); }
      .compass-mobile__route--three { --route-accent: var(--clay); }
      figcaption { margin-inline: 8px; }
    }
  </style>
</head>
<body>
  <main>
    <figure class="choice-compass" role="group" aria-labelledby="compass-title" aria-describedby="compass-caption">
      <header class="intro">
        <p class="eyebrow">Компас после Рейки II</p>
        <h1 id="compass-title">Не «куда выше», а «что вам нужно сейчас»</h1>
        <p class="lead">Компас не выдаёт автоматический ответ. Он помогает назвать задачу, с которой вы хотите продолжить путь.</p>
      </header>

      <svg viewBox="0 0 1000 870" role="img" aria-labelledby="svg-title svg-desc">
        <title id="svg-title">Круг выбора с тремя направлениями после Рейки II</title>
        <desc id="svg-desc">Три равноправных сектора показывают углубление Рейки II, личное мастерство и подготовку к передаче другим. Подготовка к преподаванию включает сначала Мастер жизни, затем Мастер-Учитель.</desc>

        <defs>
          <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#76551f" flood-opacity=".14"/>
          </filter>
        </defs>

        <!-- Delicate compass rings -->
        <circle cx="500" cy="445" r="286" fill="none" stroke="#b78a3e" stroke-dasharray="2 13" stroke-linecap="round" stroke-width="3"/>
        <circle cx="500" cy="445" r="233" fill="#fffdf8" stroke="#76551f" stroke-width="3" filter="url(#shadow)"/>

        <!-- Three equal 120-degree sectors -->
        <path d="M500 445 L298.2 328.5 A233 233 0 0 1 701.8 328.5 Z" fill="#dce8df" stroke="#fffdf8" stroke-width="5"/>
        <path d="M500 445 L701.8 328.5 A233 233 0 0 1 500 678 Z" fill="#eadfbd" stroke="#fffdf8" stroke-width="5"/>
        <path d="M500 445 L500 678 A233 233 0 0 1 298.2 328.5 Z" fill="#ead5c9" stroke="#fffdf8" stroke-width="5"/>

        <!-- Sector symbols, not scores -->
        <g aria-hidden="true" fill="none" stroke-linecap="round" stroke-width="6">
          <path d="M420 342 q32-28 64 0 q-32 28-64 0z" stroke="#315f5b"/>
          <path d="M420 368 q32-28 64 0" stroke="#315f5b"/>

          <circle cx="601" cy="478" r="36" stroke="#76551f"/>
          <circle cx="601" cy="478" r="9" fill="#b78a3e" stroke="none"/>
          <path d="M601 424 v-19 M601 551 v-19 M547 478 h-19 M674 478 h-19" stroke="#76551f"/>

          <circle cx="412" cy="529" r="13" fill="#9a5f48" stroke="none"/>
          <circle cx="370" cy="571" r="11" fill="#9a5f48" stroke="none"/>
          <circle cx="454" cy="571" r="11" fill="#9a5f48" stroke="none"/>
          <path d="M412 548 v40 M370 586 q42 36 84 0" stroke="#9a5f48"/>
        </g>

        <!-- Centre question -->
        <circle cx="500" cy="445" r="92" fill="#315f5b"/>
        <text x="500" y="419" text-anchor="middle" fill="#fffdf8" font-family="Segoe UI, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="1.4">ТЕКУЩАЯ ТОЧКА</text>
        <text x="500" y="449" text-anchor="middle" fill="#fffdf8" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700">Что мне</text>
        <text x="500" y="476" text-anchor="middle" fill="#fffdf8" font-family="Georgia, Times New Roman, serif" font-size="21" font-weight="700">нужно сейчас?</text>

        <!-- Connectors to external labels -->
        <path class="connector" d="M354 264 C276 214 230 198 176 197"/>
        <circle cx="354" cy="264" r="6" fill="#315f5b"/>

        <path class="connector" d="M680 348 C749 303 802 275 858 259"/>
        <circle cx="680" cy="348" r="6" fill="#76551f"/>

        <path class="connector" d="M352 620 C282 672 223 706 168 722"/>
        <circle cx="352" cy="620" r="6" fill="#9a5f48"/>

        <!-- External labels: direct text, no boxes -->
        <text x="46" y="112" class="sector-kicker">НАПРАВЛЕНИЕ 01</text>
        <text x="46" y="151" class="sector-title">Углублять Рейки II</text>
        <text x="46" y="183" class="sector-copy">Практиковать устойчивее,</text>
        <text x="46" y="208" class="sector-copy">не меняя ступень</text>

        <text x="704" y="132" class="sector-kicker">НАПРАВЛЕНИЕ 02</text>
        <text x="704" y="171" class="sector-title">«Мастер жизни»</text>
        <text x="704" y="203" class="sector-copy">Личное мастерство</text>
        <text x="704" y="228" class="sector-copy">без обязанности учить</text>

        <text x="46" y="734" class="sector-kicker">НАПРАВЛЕНИЕ 03</text>
        <text x="46" y="773" class="sector-title">Передавать другим</text>
        <text x="46" y="805" class="sector-copy">Сначала «Мастер жизни»,</text>
        <text x="46" y="830" class="sector-copy">затем «Мастер-Учитель»</text>

        <!-- Important sequence inside the teaching sector -->
        <path d="M395 610 C405 645 438 660 469 645 C495 632 507 602 500 572" fill="none" stroke="#9a5f48" stroke-dasharray="3 10" stroke-linecap="round" stroke-width="4"/>
        <circle cx="395" cy="610" r="8" fill="#9a5f48"/>
        <circle cx="500" cy="572" r="8" fill="#9a5f48"/>
        <text x="454" y="692" text-anchor="middle" fill="#9a5f48" font-family="Segoe UI, system-ui, sans-serif" font-size="14" font-weight="800">ЛИЧНЫЙ ЭТАП → УЧИТЕЛЬСКИЙ ЭТАП</text>
      </svg>

      <div class="compass-mobile" aria-hidden="true">
        <div class="compass-mobile__centre">Что мне нужно сейчас?</div>
        <div class="compass-mobile__route compass-mobile__route--one">
          <small>Направление 01</small>
          <strong>Углублять Рейки II</strong>
          <span>Практиковать устойчивее, не меняя ступень</span>
        </div>
        <div class="compass-mobile__route compass-mobile__route--two">
          <small>Направление 02</small>
          <strong>«Мастер жизни»</strong>
          <span>Личное мастерство без обязанности учить</span>
        </div>
        <div class="compass-mobile__route compass-mobile__route--three">
          <small>Направление 03</small>
          <strong>Передавать другим</strong>
          <span>Сначала «Мастер жизни», затем «Мастер-Учитель»</span>
        </div>
      </div>

      <figcaption id="compass-caption"><strong>У компаса нет правильного сектора.</strong> Он не оценивает вас и не заставляет двигаться дальше: выбор зависит от задачи, а не от идеи, что следующая ступень всегда лучше текущей.</figcaption>
    </figure>
  </main>
</body>
</html>
