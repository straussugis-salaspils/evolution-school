<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>История обучения перед первым разговором</title>
  <style>
    .eh-insert-preview {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: #f8f0dc;
      color: #292319;
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .eh15history,
    .eh15history * {
      box-sizing: border-box;
    }

    .eh15history {
      --ink: #292319;
      --sage: #7f9283;
      --brick: #9a5f48;
      --paper: #faf6eb;
      position: relative;
      width: min(100%, 760px);
      max-width: calc(100vw - 32px);
      min-height: 700px;
      margin: 0;
      overflow: hidden;
      border: 1px solid #d4cdbf;
      background: var(--paper);
      box-shadow: 0 24px 60px rgba(31, 48, 43, .12);
      isolation: isolate;
    }

    .eh15history::before {
      content: "ИСТОРИЯ";
      position: absolute;
      z-index: -1;
      top: 40px;
      right: -26px;
      color: rgba(31, 48, 43, .045);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(86px, 19vw, 150px);
      font-weight: 700;
      line-height: .8;
      writing-mode: vertical-rl;
    }

    .eh15history__masthead {
      width: 62%;
      padding: 38px 42px 22px;
      border-bottom: 1px solid #beb6a7;
    }

    .eh15history__eyebrow {
      margin: 0 0 8px;
      color: var(--brick);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    .eh15history .eh15history__title {
      margin: 0 !important;
      color: var(--ink) !important;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(30px, 6vw, 49px) !important;
      font-weight: 500;
      line-height: .98 !important;
      letter-spacing: -.03em;
    }

    .eh15history__thread {
      position: absolute;
      top: 240px;
      bottom: 46px;
      left: 50%;
      width: 2px;
      background: linear-gradient(var(--brick), var(--sage));
      transform: rotate(8deg);
      transform-origin: top;
    }

    .eh15history__fragment {
      position: absolute;
      width: 270px;
      padding: 12px 16px 14px;
      border-left: 5px solid var(--sage);
      background: rgba(250, 246, 235, .92);
      box-shadow: 0 10px 22px rgba(31, 48, 43, .08);
      clip-path: polygon(0 0, 100% 4%, 96% 100%, 2% 94%);
    }

    .eh15history__fragment strong {
      display: block;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
    }

    .eh15history__fragment span {
      display: block;
      margin-top: 6px;
      color: #66716b;
      font-size: 12px;
      line-height: 1.35;
    }

    .eh15history__fragment::after {
      content: "";
      position: absolute;
      top: 17px;
      width: 44px;
      height: 1px;
      background: #9da79f;
    }

    .eh15history__fragment--program {
      top: 258px;
      left: 44px;
      transform: rotate(-2deg);
    }

    .eh15history__fragment--certificate {
      top: 332px;
      right: 40px;
      border-left-color: var(--brick);
      transform: rotate(1.5deg);
    }

    .eh15history__fragment--practice {
      top: 406px;
      left: 86px;
      transform: rotate(1deg);
    }

    .eh15history__fragment--questions {
      top: 480px;
      right: 72px;
      border-left-color: var(--brick);
      transform: rotate(-1.5deg);
    }

    .eh15history__fragment--timeline {
      top: 550px;
      left: 42px;
      transform: rotate(-1deg);
    }

    .eh15history__fragment:nth-of-type(even)::after {
      left: -49px;
    }

    .eh15history__fragment:nth-of-type(odd)::after {
      right: -49px;
    }

    .eh15history__truth {
      position: absolute;
      top: 80px;
      right: 34px;
      width: 210px;
      margin: 0;
      color: #536059;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 16px;
      font-style: italic;
      line-height: 1.35;
    }

    .eh15history__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 620px) {
      .eh15history {
        min-height: auto;
        padding-bottom: 28px;
      }

      .eh15history::before,
      .eh15history__thread {
        display: none;
      }

      .eh15history__masthead {
        width: 100%;
        padding: 28px 22px 18px;
      }

      .eh15history__truth {
        position: static;
        width: auto;
        margin: 20px 22px 26px;
      }

      .eh15history__fragment {
        position: relative;
        top: auto;
        right: auto;
        left: auto;
        width: calc(100% - 44px);
        margin: -3px 22px 14px;
        transform: none;
      }

      .eh15history__fragment:nth-of-type(even) {
        margin-left: 34px;
      }

      .eh15history__fragment::after {
        display: none;
      }
    }
  </style>
</head>
<body class="eh-insert-preview">
<figure class="eh15history" role="group" aria-labelledby="eh15history-title" aria-describedby="eh15history-desc">
    <header class="eh15history__masthead">
      <p class="eh15history__eyebrow">Перед первым разговором</p>
      <h2 class="eh15history__title" id="eh15history-title">Соберите историю обучения</h2>
    </header>

    <p class="eh15history__truth" id="eh15history-desc">Не доказательства духовной ценности — обычные факты, которые помогают увидеть вашу реальную точку.</p>
    <div class="eh15history__thread" aria-hidden="true"></div>

    <div class="eh15history__fragment eh15history__fragment--program">
      <strong>Программа</strong>
      <span>Какие темы и инструменты вы изучали</span>
    </div>
    <div class="eh15history__fragment eh15history__fragment--certificate">
      <strong>Сертификат</strong>
      <span>Ступень, Учитель и линия, если она известна</span>
    </div>
    <div class="eh15history__fragment eh15history__fragment--practice">
      <strong>Практика</strong>
      <span>Что осталось живым, а что успело забыться</span>
    </div>
    <div class="eh15history__fragment eh15history__fragment--questions">
      <strong>Вопросы</strong>
      <span>Что пока неясно и зачем вы хотите продолжать</span>
    </div>
    <div class="eh15history__fragment eh15history__fragment--timeline">
      <strong>Хронология</strong>
      <span>Примерные даты обучения и длительность перерыва</span>
    </div>

    <figcaption class="eh15history__sr">Редакционный коллаж истории обучения: программа, сертификат, практика, вопросы и хронология соединены одной нитью. Он предлагает принести на разговор обычные факты, а не идеальную версию опыта.</figcaption>
  </figure>
</body>
</html>
