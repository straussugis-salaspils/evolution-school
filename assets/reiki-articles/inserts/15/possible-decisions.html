<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Решения после разговора</title>
  <style>
    .eh-insert-preview {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: #f8f0dc;
      color: #292319;
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .eh15decisions,
    .eh15decisions * {
      box-sizing: border-box;
    }

    .eh15decisions {
      --ink: #292319;
      --muted: #6d6559;
      --branch: #829788;
      --accent: #9a5f48;
      position: relative;
      width: min(100%, 760px);
      max-width: calc(100vw - 32px);
      margin: 0;
      padding: clamp(28px, 5vw, 46px);
      overflow: hidden;
      border: 1px solid #d7d0c2;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 34%, rgba(130, 151, 136, .13), transparent 28%),
        #fbf8f0;
      color: var(--ink);
      box-shadow: 0 18px 48px rgba(36, 53, 47, .08);
    }

    .eh15decisions__heading {
      max-width: 650px;
      margin: 0 auto;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(28px, 5cqw, 42px);
      font-weight: 500;
      line-height: 1.04;
      text-align: center;
      text-wrap: balance;
    }

    .eh15decisions__map {
      position: relative;
      margin-top: clamp(24px, 4vw, 36px);
    }

    .eh15decisions__map svg {
      display: none;
    }

    .eh15decisions__hub {
      position: relative;
      z-index: 1;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 15px 26px 16px;
      border-radius: 999px;
      background: var(--ink);
      color: #fffdf8;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 20px;
      line-height: 1.1;
      text-align: center;
      box-shadow: 0 12px 28px rgba(36, 53, 47, .16);
    }

    .eh15decisions__hub::after {
      position: absolute;
      top: 100%;
      left: 50%;
      width: 1px;
      height: 28px;
      background: var(--branch);
      content: "";
    }

    .eh15decisions__options {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 28px 0 0;
      padding: 0;
      list-style: none;
    }

    .eh15decisions__options::before {
      position: absolute;
      top: -1px;
      left: 8%;
      width: 84%;
      height: 1px;
      background: var(--branch);
      content: "";
    }

    .eh15decisions__option {
      position: relative;
      min-height: 112px;
      padding: 26px 18px 20px;
      border: 1px solid rgba(130, 151, 136, .46);
      border-radius: 18px;
      background: rgba(255, 253, 248, .88);
      color: var(--ink);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 17px;
      line-height: 1.2;
    }

    .eh15decisions__option::before {
      position: absolute;
      top: -6px;
      left: 18px;
      width: 10px;
      height: 10px;
      border: 2px solid var(--branch);
      border-radius: 50%;
      background: #fbf8f0;
      content: "";
    }

    .eh15decisions__option--f {
      border-color: rgba(154, 95, 72, .5);
      background: rgba(154, 95, 72, .08);
    }

    .eh15decisions__option--f::before {
      border-color: var(--accent);
    }

    .eh15decisions__note {
      display: block;
      margin-top: 10px;
      color: var(--accent);
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .04em;
      line-height: 1.35;
      text-transform: uppercase;
    }

    .eh15decisions__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 700px) {
      .eh15decisions {
        padding: 28px 20px 30px;
        border-radius: 24px;
      }

      .eh15decisions__heading {
        font-size: clamp(27px, 8vw, 34px);
      }

      .eh15decisions__hub {
        padding-inline: 20px;
        font-size: 18px;
      }

      .eh15decisions__hub::after,
      .eh15decisions__options::before {
        display: none;
      }

      .eh15decisions__options {
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 18px;
      }

      .eh15decisions__option {
        min-height: 0;
        padding: 18px 18px 17px 38px;
        font-size: 16px;
      }

      .eh15decisions__option::before {
        top: 21px;
        left: 16px;
      }
    }
  </style>
</head>
<body class="eh-insert-preview">
  <figure class="eh15decisions" role="img" aria-labelledby="eh15decisions-title" aria-describedby="eh15decisions-desc">
    <h2 class="eh15decisions__heading" id="eh15decisions-title">Разговор не обязан заканчиваться продажей</h2>
    <div class="eh15decisions__map">
      <svg viewBox="0 0 760 554" aria-hidden="true" focusable="false"></svg>
      <div class="eh15decisions__hub">Первый честный разговор</div>
      <ul class="eh15decisions__options" id="eh15decisions-desc">
        <li class="eh15decisions__option eh15decisions__option--a">Вернуться к самостоятельной практике</li>
        <li class="eh15decisions__option eh15decisions__option--b">Повторить часть учебных материалов</li>
        <li class="eh15decisions__option eh15decisions__option--c">Пройти подготовку в новой школе</li>
        <li class="eh15decisions__option eh15decisions__option--d">Обсудить переинициацию</li>
        <li class="eh15decisions__option eh15decisions__option--e">Перейти к разговору о следующей ступени</li>
        <li class="eh15decisions__option eh15decisions__option--f">Найти другого Мастера<span class="eh15decisions__note">Этот вариант тоже нормален</span></li>
      </ul>
    </div>
    <figcaption class="eh15decisions__sr">Из первого честного разговора выходят шесть равноправных решений. Ни одна ветвь не показана выше, крупнее или ярче остальных.</figcaption>
  </figure>
</body>
</html>
