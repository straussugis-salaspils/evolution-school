<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Информация и живая передача Рейки</title>
<style>
#eh-r06{--ink:#292319;--muted:#6d6559;--gold:#b78a3e;--deep:#76551f;--teal:#315f5b;--clay:#9a5f48;box-sizing:border-box;width:100%;container-type:inline-size;margin:0;padding:clamp(22px,5cqw,42px);border:1px solid #76551f33;border-radius:30px;background:linear-gradient(145deg,#fffdf8,#f8f0dc);color:var(--ink);font-family:var(--viz-font-display, Georgia, "Times New Roman", serif)}#eh-r06 *{box-sizing:border-box}#eh-r06 .k{margin:0 0 7px;color:var(--deep);font:800 11px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);letter-spacing:.13em;text-transform:uppercase}#eh-r06 h3{max-width:650px;margin:0;font-size:clamp(28px,5cqw,43px);font-weight:500;line-height:1.03;text-wrap:balance}#eh-r06 .contrast{display:grid;grid-template-columns:.88fr 1.12fr;gap:36px;align-items:center;margin-top:34px}#eh-r06 .lane{min-width:0}#eh-r06 h4{margin:0 0 8px;font-size:25px;font-weight:500}#eh-r06 .sub{margin:0;color:var(--muted);font:14px/1.45 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}#eh-r06 .oneway{display:flex;gap:10px;align-items:center;margin:28px 0}#eh-r06 .source{display:grid;width:70px;height:70px;place-items:center;border-radius:50%;background:#eadfbd}#eh-r06 .source.video{background:#e6d5cb}#eh-r06 .source svg{width:42px;height:42px}#eh-r06 .arrow{flex:1;height:3px;background:var(--gold);position:relative}#eh-r06 .arrow:after{position:absolute;top:50%;right:-2px;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:12px solid var(--gold);content:"";transform:translateY(-50%)}#eh-r06 .reader{display:grid;width:82px;height:82px;place-items:center;border:2px solid var(--deep);border-radius:50%;font:700 12px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);text-align:center}
#eh-r06 .cycle{position:relative;width:min(72%,280px);aspect-ratio:1;margin:30px auto 28px}#eh-r06 .cycle svg{position:absolute;inset:0;width:100%;height:100%}#eh-r06 .node{position:absolute;width:100px;text-align:center;font:700 13px/1.25 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}#eh-r06 .node:before{display:block;width:14px;height:14px;margin:0 auto 6px;border:4px solid #fffdf8;border-radius:50%;background:var(--teal);box-shadow:0 0 0 2px var(--teal);content:""}#eh-r06 .q{top:-6%;left:50%;transform:translateX(-50%)}#eh-r06 .o{top:50%;right:-25%;transform:translateY(-50%)}#eh-r06 .c{bottom:-10%;left:50%;transform:translateX(-50%)}#eh-r06 .v{top:50%;left:-25%;transform:translateY(-50%)}#eh-r06 figcaption{margin-top:24px;padding-top:18px;border-top:1px solid #76551f33;color:var(--deep);font:15px/1.5 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}

</style></head><body style="margin:0;padding:12px;background:#fffdf8">
<figure id="eh-r06" role="group" aria-labelledby="r06-title" aria-describedby="r06-caption"><p class="k">Два разных процесса</p><h3 id="r06-title">Получить информацию — не то же самое, что пройти живой цикл обучения</h3>
<div class="contrast">
<section class="lane" aria-labelledby="r06-info"><h4 id="r06-info">Книга и видео: поток в одну сторону</h4><p class="sub">Материал можно прочитать, пересмотреть и запомнить. Но он не видит, как именно вы поняли и применили инструкцию.</p><div class="oneway" aria-label="Книга и видео передают информацию читателю в одном направлении"><span class="source" aria-hidden="true"><svg viewBox="0 0 44 44"><path d="M5 9c10-4 14-1 17 3v26c-5-5-11-6-17-3zM39 9c-10-4-14-1-17 3v26c5-5 11-6 17-3z" fill="#76551f"/></svg></span><span class="source video" aria-hidden="true"><svg viewBox="0 0 44 44"><rect x="4" y="8" width="36" height="28" rx="5" fill="#9a5f48"/><path d="M19 15l12 7-12 7z" fill="#fffdf8"/></svg></span><span class="arrow" aria-hidden="true"></span><span class="reader">человек получает материал</span></div></section>
<section class="lane live" aria-labelledby="r06-live"><h4 id="r06-live">Передача: цикл с обратной связью</h4><p class="sub">В живом обучении вопрос меняет наблюдение, наблюдение — коррекцию, а затем можно снова проверить понимание.</p><div class="cycle" aria-label="Цикл: вопрос, наблюдение, коррекция, проверка"><svg viewBox="0 0 390 390" aria-hidden="true"><circle cx="195" cy="195" r="126" fill="none" stroke="#315f5b" stroke-width="4" stroke-dasharray="3 12" stroke-linecap="round"/><path d="M195 69a126 126 0 0 1 126 126M321 195a126 126 0 0 1-126 126M195 321A126 126 0 0 1 69 195M69 195A126 126 0 0 1 195 69" fill="none" stroke="#b78a3e" stroke-width="5" stroke-linecap="round"/><circle cx="195" cy="195" r="57" fill="#315f5b"/><text x="195" y="189" text-anchor="middle" fill="#fffdf8" font-family="Georgia, Times New Roman, serif" font-size="19">живая</text><text x="195" y="214" text-anchor="middle" fill="#fffdf8" font-family="Georgia, Times New Roman, serif" font-size="19">передача</text></svg><span class="node q">вопрос</span><span class="node o">наблюдение</span><span class="node c">коррекция</span><span class="node v">проверка</span></div></section>
</div><figcaption id="r06-caption"><strong>Самостоятельный материал полезен внутри своей задачи.</strong> Но он не создаёт обратную связь и не заменяет процесс, в котором Мастер может увидеть понимание, уточнить и проверить.</figcaption></figure>
