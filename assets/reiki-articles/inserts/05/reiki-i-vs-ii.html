<figure id="eh-r05" role="group" aria-labelledby="r05-title" aria-describedby="r05-caption"><header><p class="k">Не ступеньки вверх, а расширение практики</p><h3 id="r05-title">Две полноценные возможности на одной линии</h3></header>
<div class="field">
<section class="world one" aria-labelledby="r05-one"><div class="orb" aria-hidden="true"><svg viewBox="0 0 110 110"><circle cx="55" cy="55" r="43" fill="#fffdf8"/><path d="M25 73c18-3 24-17 28-45M85 75c-17-4-23-19-26-47" fill="none" stroke="#315f5b" stroke-width="8" stroke-linecap="round"/><circle cx="55" cy="53" r="8" fill="#b78a3e"/></svg></div><h4 id="r05-one">Рейки I</h4><p class="task">Самостоятельная практика через руки</p><p>Положения рук и личный сеанс становятся законченным навыком, которым человек может пользоваться сам.</p><span class="base">Можно остаться на этой ступени</span></section>
<section class="world two" aria-labelledby="r05-two"><div class="orb" aria-hidden="true"><svg viewBox="0 0 110 110"><circle cx="55" cy="55" r="43" fill="#fffdf8"/><path d="M55 18v74M18 55h74M29 29l52 52M81 29L29 81" stroke="#b78a3e" stroke-width="5" stroke-linecap="round"/><circle cx="55" cy="55" r="16" fill="#315f5b"/><circle cx="55" cy="55" r="6" fill="#fffdf8"/></svg></div><h4 id="r05-two">Рейки II</h4><p class="task">Символы и дистанционная практика</p><p>Вторая ступень добавляет инструменты для работы без непосредственного контакта и опирается на навык первой.</p><span class="base">Переход дальше тоже не автоматический</span></section>
