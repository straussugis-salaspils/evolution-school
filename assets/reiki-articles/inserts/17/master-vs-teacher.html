<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Мастер и Учитель — разные роли</title>
  <style>
    .eh-insert-preview {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: #f8f0dc;
      color: #292319;
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .eh17fork,
    .eh17fork * {
      box-sizing: border-box;
    }

    .eh17fork {
      --ink: #292319;
      --left: #9a5f48;
      --right: #728c7d;
      position: relative;
      width: min(100%, 760px);
      max-width: calc(100vw - 32px);
      margin: 0;
      padding: 38px clamp(22px, 5vw, 50px) 42px;
      overflow: hidden;
      border: 1px solid #d4ccbd;
      background: #fbf8f0;
    }

    .eh17fork::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(154, 101, 78, .055) 0 50%, rgba(114, 140, 125, .06) 50% 100%);
      pointer-events: none;
    }

    .eh17fork__title {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(30px, 5.8vw, 48px);
      font-weight: 500;
      line-height: 1;
      text-align: center;
      letter-spacing: -.025em;
    }

    .eh17fork__source {
      position: relative;
      width: fit-content;
      margin: 28px auto 0;
      padding: 8px 16px;
      border-bottom: 2px solid var(--ink);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .eh17fork__drawing {
      position: relative;
      height: 150px;
      margin: 0;
    }

    .eh17fork__drawing svg {
      width: 100%;
      height: 100%;
    }

    .eh17fork__drawing path {
      fill: none;
      stroke-width: 3;
      vector-effect: non-scaling-stroke;
    }

    .eh17fork__drawing path:first-child { stroke: var(--left); }
    .eh17fork__drawing path:last-child { stroke: var(--right); }

    .eh17fork__roles {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(26px, 8vw, 80px);
      margin-top: -8px;
    }

    .eh17fork__role {
      min-width: 0;
      padding-top: 18px;
      border-top: 7px solid;
    }

    .eh17fork__role:first-child { border-color: var(--left); }
    .eh17fork__role:last-child { border-color: var(--right); }

    .eh17fork__role h3 {
      margin: 0;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 500;
      line-height: 1;
    }

    .eh17fork__role p {
      margin: 12px 0 0;
      color: #647068;
      font-size: clamp(13px, 2vw, 16px);
      line-height: 1.48;
    }

    .eh17fork__role strong {
      display: block;
      margin-top: 18px;
      color: var(--ink);
      font-size: 12px;
      letter-spacing: .04em;
    }

    .eh17fork__equal {
      position: relative;
      margin: 32px 0 0;
      padding-top: 16px;
      border-top: 1px solid #c9c1b3;
      color: #5b6861;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 16px;
      font-style: italic;
      text-align: center;
    }

    .eh17fork__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 520px) {
      .eh17fork {
        padding: 28px 20px 30px;
      }

      .eh17fork__drawing {
        height: 108px;
      }

      .eh17fork__roles {
        gap: 22px;
      }

      .eh17fork__role {
        padding-top: 12px;
        border-top-width: 5px;
      }

      .eh17fork__role h3 {
        font-size: 21px;
      }

      .eh17fork__role p {
        font-size: 12px;
      }

      .eh17fork__role strong {
        font-size: 10px;
      }
    }
  </style>
</head>
<body class="eh-insert-preview">
  <figure class="eh17fork" role="img" aria-labelledby="eh17fork-title" aria-describedby="eh17fork-desc">
    <h2 class="eh17fork__title" id="eh17fork-title">Мастерство не обязывает становиться Учителем</h2>
    <p class="eh17fork__source">После Рейки II</p>

    <div class="eh17fork__drawing" aria-hidden="true">
      <svg viewBox="0 0 660 150" focusable="false">
        <path d="M330 0 C330 62 240 72 145 142"></path>
        <path d="M330 0 C330 62 420 72 515 142"></path>
      </svg>
    </div>

    <div class="eh17fork__roles" id="eh17fork-desc">
      <section class="eh17fork__role">
        <h3>Личное мастерство</h3>
        <p>«Мастер жизни» углубляет практику и переносит мастерство в собственные решения, отношения и ответственность.</p>
        <strong>Полноценный путь для себя</strong>
      </section>
      <section class="eh17fork__role">
        <h3>Подготовка к преподаванию</h3>
        <p>Мастер-Учитель дополнительно учится обучать, проводить инициации и сопровождать учеников.</p>
        <strong>Отдельная роль и ответственность</strong>
      </section>
    </div>

    <p class="eh17fork__equal">Обе ветви имеют собственную задачу. Одна не является сокращённой версией другой.</p>
    <figcaption class="eh17fork__sr">Ненумерованная развилка после Рейки II ведёт к двум равным по визуальному весу ролям: личному мастерству и дополнительной подготовке к преподаванию.</figcaption>
  </figure>
</body>
</html>
