<figure id="eh-r02" role="group" aria-labelledby="r02-title" aria-describedby="r02-desc">
<header><p class="k">Инициация онлайн · реальная последовательность</p><h3 id="r02-title">Одна встреча — и практика, которая продолжается у вас</h3><p class="lead" id="r02-desc">Мастер не находится рядом физически: во время встречи он присутствует только на экране. До и после неё человек действует в своём пространстве.</p></header>
<div class="journey"><span class="thread" aria-hidden="true"></span>
<section class="phase"><div class="scene" aria-hidden="true"><svg viewBox="0 0 220 168"><path d="M24 145h172V53H24z" fill="#e9dfc6"/><path d="M40 129h76V92H40z" fill="#fffdf8"/><path d="M132 129h49V72h-49z" fill="#d4e2dc"/><circle cx="156" cy="95" r="13" fill="#315f5b"/><path d="M70 92V67m-16 0h32" stroke="#76551f" stroke-width="5" stroke-linecap="round"/><circle cx="24" cy="84" r="8" fill="#315f5b"/></svg></div><span class="n">01</span><h4>Подготовить место</h4><p>Устроиться так, чтобы встречу не прерывали, проверить связь и выполнить полученные инструкции по подготовке.</p></section>
<section class="phase"><div class="scene" aria-hidden="true"><svg viewBox="0 0 220 168"><rect x="26" y="25" width="168" height="108" rx="12" fill="#315f5b"/><rect x="38" y="37" width="144" height="84" rx="7" fill="#f7eed8"/><circle cx="110" cy="69" r="18" fill="#b78a3e"/><path d="M77 110c7-25 59-25 66 0" fill="#d7c391"/><path d="M88 144h44M110 133v11" stroke="#76551f" stroke-width="5" stroke-linecap="round"/><circle cx="24" cy="84" r="8" fill="#b78a3e"/></svg></div><span class="n">02</span><h4>Встретиться онлайн</h4><p>Следовать голосу Мастера во время согласованной встречи. Мастер ведёт процесс с экрана — в комнате рядом с участником его нет.</p></section>
<section class="phase"><div class="scene" aria-hidden="true"><svg viewBox="0 0 220 168"><circle cx="110" cy="82" r="56" fill="#e7d5c8"/><circle cx="110" cy="60" r="17" fill="#9a5f48"/><path d="M76 122c5-38 63-38 68 0" fill="#f7eed8"/><path d="M82 103c15 11 41 11 56 0" fill="none" stroke="#315f5b" stroke-width="6" stroke-linecap="round"/><path d="M43 138c35 13 99 13 134 0" fill="none" stroke="#b78a3e" stroke-width="3"/><circle cx="24" cy="84" r="8" fill="#76551f"/></svg></div><span class="n">03</span><h4>Начать собственную практику</h4><p>После встречи использовать изученную последовательность самостоятельно и обращаться к материалам или Мастеру, когда нужен вопрос.</p></section>
</div><figcaption><strong>Инициация не заменяет обучение.</strong> Она встроена в понятный контекст: подготовка, встреча с Мастером и дальнейшая практика своими руками.</figcaption>
</figure></body></html>
