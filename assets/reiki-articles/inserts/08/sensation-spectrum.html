<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Спектр ощущений во время практики Рейки</title>
  <style>
    :root {
      --paper: #fffdf8;
      --cream: #f7efdc;
      --ink: #fffdf8;
      --muted: #cbd9d4;
      --gold: #e8c982;
      --teal: #77aaa2;
      --clay: #d99b82;
      --deep: #172e2d;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--paper); }

    .sensation-field {
      width: 100%;
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(118, 85, 31, .2);
      border-radius: 30px;
      background:
        radial-gradient(circle at 12% 18%, rgba(232, 201, 130, .11), transparent 25%),
        linear-gradient(145deg, #193432, var(--deep));
      color: var(--ink);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
    }

    .sensation-field__intro {
      display: grid;
      grid-template-columns:minmax(0, 1fr) minmax(190px, .42fr);
      gap: 28px;
      align-items: end;
      padding: clamp(24px, 5vw, 46px);
      border-bottom: 1px solid rgba(255, 255, 255, .14);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font:800 12px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 650px;
      margin: 0;
      color: var(--ink) !important;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 500;
      line-height: 1.02;
      text-wrap: balance;
    }

    .intro-note {
      margin: 0;
      color: var(--muted) !important;
      font:16px/1.55 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .signal-field {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      min-height: 400px;
    }

    .reading {
      position: relative;
      display: grid;
      grid-template-rows: 110px auto 1fr auto;
      gap: 12px;
      min-width: 0;
      padding: clamp(24px, 4vw, 38px);
    }

    .reading + .reading {
      border-left: 1px solid rgba(255, 255, 255, .14);
    }

    .reading__wave {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .reading__wave .guide {
      stroke: rgba(255, 255, 255, .18);
      stroke-width: 1;
    }

    .reading__wave .signal {
      fill: none;
      stroke: var(--teal);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 5;
    }

    .reading--quiet .signal { stroke: var(--gold); }
    .reading--attention .signal { stroke: var(--clay); }

    .reading__label {
      margin: 0;
      color: var(--muted) !important;
      font:800 12px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      letter-spacing: .09em;
      text-transform: uppercase;
    }

    .reading h2 {
      margin: 0;
      color: var(--ink) !important;
      font-size: clamp(25px, 3vw, 34px);
      font-weight: 500;
      line-height: 1.05;
    }

    .reading p {
      margin: 0;
      color: var(--muted) !important;
      font:15px/1.55 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .reading__action {
      display: block;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, .18);
      color: var(--ink) !important;
      font:700 14px/1.45 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    figcaption {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 22px clamp(24px, 5vw, 46px) 26px;
      border-top: 1px solid rgba(255, 255, 255, .14);
      color: var(--gold) !important;
      font:16px/1.55 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .caption-symbol {
      flex: 0 0 auto;
      font:26px/1 var(--viz-font-display, Georgia, "Times New Roman", serif);
    }

    @media (max-width: 720px) {
      .sensation-field { border-radius: 24px; }
      .sensation-field__intro { grid-template-columns: 1fr; gap: 14px; }
      .signal-field { grid-template-columns: 1fr; min-height: 0; }
      .reading {
        grid-template-columns: 92px minmax(0, 1fr);
        grid-template-rows: auto auto auto;
        gap: 8px 18px;
        padding: 26px 22px;
      }
      .reading + .reading {
        border-top: 1px solid rgba(255, 255, 255, .14);
        border-left: 0;
      }
      .reading__wave {
        grid-area: 1 / 1 / 4 / 2;
        align-self: center;
        height: 92px;
      }
      .reading__label { grid-column: 2; }
      .reading h2 { grid-column: 2; font-size: 27px; }
      .reading p { grid-column: 2; font-size: 15px; }
      .reading__action { grid-column: 1 / -1; }
      figcaption { padding-inline: 22px; }
    }
  </style>
</head>
<body>
  <figure class="sensation-field" role="group" aria-labelledby="sensation-title" aria-describedby="sensation-caption">
    <header class="sensation-field__intro">
      <div>
        <p class="eyebrow">Не шкала правильности</p>
        <h1 id="sensation-title">Три разных сигнала. Ни один не ставит оценку практике.</h1>
      </div>
      <p class="intro-note">Сначала можно заметить, что происходит. Объяснение и вывод появляются только потом.</p>
    </header>

    <div class="signal-field">
      <section class="reading reading--clear">
        <svg class="reading__wave" viewBox="0 0 220 100" aria-hidden="true">
          <path class="guide" d="M4 52H216"/>
          <path class="signal" d="M4 52H26L38 25L53 78L70 38L88 63L108 16L128 86L146 44L164 60L181 31L196 52H216"/>
        </svg>
        <p class="reading__label">Сигнал заметен</p>
        <h2>Ясные ощущения</h2>
        <p>Тепло, покалывание или расслабление можно заметить, не превращая их в доказательство результата.</p>
        <strong class="reading__action">Наблюдать без спешки объяснить</strong>
      </section>

      <section class="reading reading--quiet">
        <svg class="reading__wave" viewBox="0 0 220 100" aria-hidden="true">
          <path class="guide" d="M4 52H216"/>
          <path class="signal" d="M4 52C28 52 32 48 54 52S82 55 103 52S135 49 154 52S190 53 216 52"/>
        </svg>
        <p class="reading__label">Сигнал едва слышен</p>
        <h2>Почти ничего</h2>
        <p>Тихий опыт тоже возможен. Отсутствие яркости само по себе не означает ошибку.</p>
        <strong class="reading__action">Не выжимать ощущение силой</strong>
      </section>

      <section class="reading reading--attention">
        <svg class="reading__wave" viewBox="0 0 220 100" aria-hidden="true">
          <path class="guide" d="M4 52H216"/>
          <path class="signal" d="M4 52H62L76 20L92 82L109 20L126 82L143 20L160 82L176 52H216"/>
        </svg>
        <p class="reading__label">Сигнал требует внимания</p>
        <h2>Дискомфорт</h2>
        <p>Неприятное ощущение не нужно автоматически называть «процессом» и терпеть через силу.</p>
        <strong class="reading__action">Остановиться и понять, какая помощь нужна</strong>
      </section>
    </div>

    <figcaption id="sensation-caption">
      <span class="caption-symbol" aria-hidden="true">≠</span>
      <span><strong>Яркость ощущения не равна качеству практики.</strong> Это три возможных состояния, а не путь от «хуже» к «лучше».</span>
    </figcaption>
  </figure>
</body>
</html>
