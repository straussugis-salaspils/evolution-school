<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Как встроить практику Рейки в обычный день</title>
<style>
#eh-r07{--ink:#292319;--muted:#6d6559;--gold:#b78a3e;--deep:#76551f;--teal:#315f5b;--clay:#9a5f48;box-sizing:border-box;width:100%;container-type:inline-size;margin:0;padding:clamp(22px,5cqw,42px);overflow:hidden;border:1px solid #76551f33;border-radius:30px;background:linear-gradient(#fff8e8,#edf3ee);color:var(--ink);font-family:var(--viz-font-display, Georgia, "Times New Roman", serif)}#eh-r07 *{box-sizing:border-box}#eh-r07 .k{margin:0 0 7px;color:var(--deep);font:800 11px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);letter-spacing:.13em;text-transform:uppercase}#eh-r07 h3{max-width:620px;margin:0;font-size:clamp(28px,5cqw,43px);font-weight:500;line-height:1.03;text-wrap:balance}#eh-r07 .lead{max-width:650px;margin:12px 0 0;color:var(--muted);font:15px/1.5 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}
#eh-r07 .day{position:relative;height:560px;margin-top:20px}#eh-r07 .skyline{position:absolute;inset:0;width:100%;height:100%}#eh-r07 .moment{position:absolute;width:205px}#eh-r07 .moment:before{display:block;width:18px;height:18px;margin-bottom:9px;border:5px solid #fffdf8;border-radius:50%;background:var(--teal);box-shadow:0 0 0 2px var(--teal);content:""}#eh-r07 .m1{top:320px;left:3%}#eh-r07 .m2{top:132px;left:17%}#eh-r07 .m3{top:10px;right:0;width:195px}#eh-r07 .m4{right:0;bottom:0}#eh-r07 h4{margin:0;font-size:21px;font-weight:500;line-height:1.1}#eh-r07 .moment p{margin:7px 0 0;color:var(--muted);font:13px/1.4 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}#eh-r07 .optional{display:inline-block;margin-top:7px;color:var(--deep);font:800 10px/1.2 var(--viz-font-body, "Segoe UI", system-ui, sans-serif);letter-spacing:.08em;text-transform:uppercase}#eh-r07 figcaption{padding-top:18px;border-top:1px solid #76551f33;color:var(--deep);font:15px/1.5 var(--viz-font-body, "Segoe UI", system-ui, sans-serif)}

</style></head><body style="margin:0;padding:12px;background:#fffdf8">
<figure id="eh-r07" role="group" aria-labelledby="r07-title" aria-describedby="r07-caption"><p class="k">Не расписание, а точки входа</p><h3 id="r07-title">Практика может встретиться с обычным днём несколько раз</h3><p class="lead">Не нужно использовать все точки и не нужно жить по часам. Это примеры моментов, в которых короткая практика может оказаться уместной.</p>
<div class="day"><svg class="skyline" viewBox="0 0 700 470" preserveAspectRatio="none" aria-hidden="true"><path d="M24 350C145 90 265 42 355 74C390 55 420 50 448 58" fill="none" stroke="#b78a3e" stroke-width="4" stroke-dasharray="3 12" stroke-linecap="round"/><circle cx="354" cy="74" r="52" fill="#f4d590" opacity=".72"/><path d="M0 394c90-44 166-34 240 6 104-65 215-60 307-4 55-31 103-31 153-5v79H0z" fill="#dce8df"/></svg>
<section class="moment m1"><h4>Перед началом дел</h4><p>Коротко вернуться к себе, если утро позволяет.</p><span class="optional">можно выбрать</span></section>
<section class="moment m2"><h4>В естественной паузе</h4><p>Не создавать специальный ритуал, а использовать уже появившееся свободное окно.</p><span class="optional">не обязательно ежедневно</span></section>
<section class="moment m3"><h4>После напряжённого эпизода</h4><p>Сначала решить практическую задачу, затем при желании дать себе несколько спокойных минут.</p><span class="optional">по ситуации</span></section>
<section class="moment m4"><h4>Когда день завершён</h4><p>Выбрать полный сеанс, короткий формат или сегодня просто отдохнуть.</p><span class="optional">один из вариантов</span></section>
</div><figcaption id="r07-caption"><strong>Гибкость — не отсутствие практики.</strong> Реальный ритм складывается из способов, которыми человек действительно пользуется, а не из идеального расписания.</figcaption></figure>
