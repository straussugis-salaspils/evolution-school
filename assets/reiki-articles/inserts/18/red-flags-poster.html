<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Красные флаги при предложении переинициации</title>
  <style>
    .eh-insert-preview {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: #f8f0dc;
      color: #292319;
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .eh18poster,
    .eh18poster * {
      box-sizing: border-box;
    }

    .eh18poster {
      --red: #8b4037;
      --red-deep: #5b2926;
      --ink: #292319;
      --muted: #6d6559;
      --cream: #fffdf8;
      width: min(100%, 760px);
      max-width: calc(100vw - 32px);
      margin: 0;
      overflow: hidden;
      border: 1px solid rgba(91, 41, 38, .34);
      border-radius: 30px;
      background: var(--cream);
      color: var(--ink);
      box-shadow: 0 18px 46px rgba(77, 36, 34, .1);
    }

    .eh18poster__masthead {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      padding: clamp(26px, 5vw, 42px);
      border-bottom: 1px solid rgba(91, 41, 38, .18);
      background:
        radial-gradient(circle at 92% 10%, rgba(139, 64, 55, .12), transparent 30%),
        #fffdf8;
    }

    .eh18poster__title {
      max-width: 590px;
      margin: 0;
      color: var(--red-deep);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(30px, 5.4cqw, 44px);
      font-weight: 500;
      line-height: 1.02;
      text-wrap: balance;
    }

    .eh18poster__mark {
      display: grid;
      width: 68px;
      aspect-ratio: 1;
      place-items: center;
      border-radius: 50%;
      background: var(--red);
      color: var(--cream);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
    }

    .eh18poster__intro {
      margin: 0;
      padding: 18px clamp(22px, 5vw, 42px);
      border-bottom: 1px solid rgba(91, 41, 38, .18);
      background: rgba(139, 64, 55, .07);
      color: var(--ink);
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: clamp(16px, 2.3cqw, 18px);
      line-height: 1.5;
    }

    .eh18poster__claims {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 0;
      padding: clamp(22px, 4vw, 34px);
      list-style: none;
    }

    .eh18poster__claim {
      position: relative;
      min-height: 94px;
      margin: 0;
      padding: 20px 18px 18px 46px;
      border: 1px solid rgba(91, 41, 38, .2);
      border-left: 4px solid var(--red);
      border-radius: 14px;
      background: rgba(255, 255, 255, .56);
      color: var(--ink);
      font-size: 15px;
      font-weight: 650;
      line-height: 1.35;
    }

    .eh18poster__claim::before {
      position: absolute;
      top: 19px;
      left: 16px;
      color: var(--red);
      content: "×";
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .eh18poster__claim:last-child {
      grid-column: 1 / -1;
      min-height: 0;
    }

    .eh18poster footer.eh18poster__footer {
      display: grid !important;
      grid-template-columns: minmax(0, .85fr) minmax(0, 1.15fr) !important;
      gap: 26px;
      align-items: center;
      width: auto !important;
      min-height: 0 !important;
      height: auto !important;
      margin: 0 !important;
      padding: 24px clamp(22px, 5vw, 42px);
      border-top: 1px solid rgba(91, 41, 38, .2);
      background: #f2e5cf;
      color: var(--ink);
    }

    .eh18poster__footer strong {
      display: block;
      width: auto;
      color: var(--red-deep);
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(23px, 3.6cqw, 31px);
      font-weight: 500;
      line-height: 1.05;
    }

    .eh18poster__footer span {
      display: block;
      width: auto;
      max-width: none;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .eh18poster__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 560px) {
      .eh18poster {
        border-radius: 24px;
      }

      .eh18poster__masthead {
        gap: 14px;
        padding: 24px 18px;
      }

      .eh18poster__title {
        font-size: clamp(27px, 8.3vw, 34px);
      }

      .eh18poster__mark {
        width: 52px;
        font-size: 38px;
      }

      .eh18poster__intro {
        padding: 16px 18px;
      }

      .eh18poster__claims {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .eh18poster__claim,
      .eh18poster__claim:last-child {
        grid-column: auto;
        min-height: 0;
        padding: 17px 15px 16px 42px;
        font-size: 14px;
      }

      .eh18poster__claim::before {
        top: 16px;
        left: 14px;
      }

      .eh18poster footer.eh18poster__footer {
        grid-template-columns: 1fr !important;
        gap: 9px;
        padding: 20px 18px;
      }
    }
  </style>
</head>
<body class="eh-insert-preview">
  <figure class="eh18poster" role="group" aria-labelledby="eh18poster-title" aria-describedby="eh18poster-desc">
    <header class="eh18poster__masthead">
      <h2 class="eh18poster__title" id="eh18poster-title">Не покупайте решение через страх</h2>
      <div class="eh18poster__mark" aria-hidden="true">!</div>
    </header>
    <p class="eh18poster__intro" id="eh18poster-desc">Остановитесь, если переинициацию продают такими обещаниями:</p>
    <ul class="eh18poster__claims">
      <li class="eh18poster__claim">«Прошлая инициация была неправильной» — без ясных оснований</li>
      <li class="eh18poster__claim">«Только мы можем восстановить вашу проводимость»</li>
      <li class="eh18poster__claim">«После повторной настройки поток гарантированно станет сильнее»</li>
      <li class="eh18poster__claim">«Без неё прежние сертификаты недействительны»</li>
      <li class="eh18poster__claim">«Отсутствие ощущений доказывает, что настройка потеряна»</li>
    </ul>
    <footer class="eh18poster__footer">
      <strong>Переинициация — не ремонт человека.</strong>
      <span>Ученик имеет право понимать задачу процедуры, правило решения и дальнейший путь.</span>
    </footer>
    <figcaption class="eh18poster__sr">Контрастный редакционный плакат перечисляет пять обещаний, которые должны насторожить при предложении переинициации. В нём нет образа сломанного канала.</figcaption>
  </figure>
</body>
</html>
