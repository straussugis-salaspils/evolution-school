<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Пилот 14B — содержание третьей ступени</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fffdf8;
      --cream: #f8f0dc;
      --ink: #292319;
      --muted: #6d6559;
      --gold: #b78a3e;
      --gold-deep: #76551f;
      --teal: #315f5b;
      --clay: #9a5f48;
      --line: rgba(118, 85, 31, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--paper);
      color: var(--ink);
      font-family:var(--viz-font-display, Georgia, "Times New Roman", serif);
    }

    main {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(28px, 6vw, 72px) 0;
    }

    .scope-map {
      container-name: scope-map;
      container-type: inline-size;
      margin: 0;
      padding: clamp(24px, 5vw, 56px);
      border-radius: 34px;
      background:
        linear-gradient(rgba(255, 253, 248, .78), rgba(255, 253, 248, .78)),
        repeating-linear-gradient(0deg, transparent 0 45px, rgba(118, 85, 31, .07) 46px),
        var(--cream);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(240px, .6fr);
      gap: 36px;
      align-items: end;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--gold-deep);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 64px);
      font-weight: 500;
      line-height: .98;
      text-wrap: balance;
    }

    .intro {
      margin: 0;
      color: var(--muted);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: clamp(28px, 5vw, 48px);
      margin-top: clamp(34px, 6vw, 64px);
      padding-top: 30px;
      border-top: 1px solid var(--line);
    }

    .reading {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 28px;
      align-items: center;
    }

    .reading > *,
    .shape,
    .island {
      min-width: 0;
    }

    .reading-label {
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .reading-label small {
      display: block;
      margin-bottom: 7px;
      color: var(--gold-deep);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .reading-label strong {
      display: block;
      font-family:var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: 22px;
      font-weight: 500;
      line-height: 1.1;
    }

    .shape {
      position: relative;
      min-height: 132px;
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .separated {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px minmax(0, 1fr);
      align-items: center;
    }

    .island {
      display: flex;
      min-height: 112px;
      align-items: center;
      flex-direction: column;
      justify-content: center;
      padding: 20px 24px;
      border-radius: 56px 20px 56px 20px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .island.personal { background: #eadfbd; }
    .island.teacher { background: #d9e5df; }

    .island strong,
    .island span {
      display: block;
      width: 100%;
    }

    .island strong { margin-bottom: 5px; }

    .later {
      position: relative;
      height: 2px;
      background: var(--gold);
    }

    .later::before,
    .later::after {
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold-deep);
      content: "";
      transform: translateY(-50%);
    }

    .later::before { left: 0; }
    .later::after { right: 0; }

    .later span {
      position: absolute;
      top: 10px;
      left: 50%;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      transform: translateX(-50%);
    }

    .merged {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      overflow: hidden;
      border: 2px solid var(--teal);
      border-radius: 66px 22px 66px 22px;
      background: #edf3ef;
    }

    .merged span {
      display: flex;
      min-height: 128px;
      align-items: center;
      justify-content: center;
      padding: 22px;
      border-left: 1px dashed rgba(49, 95, 91, .38);
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
    }

    .merged span:first-child { border-left: 0; }

    .layers {
      display: grid;
      padding: 4px 0 20px;
    }

    .layer {
      display: flex;
      min-height: 58px;
      align-items: center;
      padding: 12px 22px;
      border-radius: 30px 12px 30px 12px;
      font-weight: 700;
      line-height: 1.35;
      box-shadow: 0 8px 20px rgba(41, 35, 25, .08);
    }

    .layer:nth-child(1) {
      width: 68%;
      background: #eadfbd;
    }

    .layer:nth-child(2) {
      width: 82%;
      margin: -7px 0 0 8%;
      background: #d9e5df;
    }

    .layer:nth-child(3) {
      width: 92%;
      margin: -7px 0 0 16%;
      background: #e6d2c8;
    }

    figcaption {
      margin-top: clamp(34px, 5vw, 58px);
      padding: 20px 24px;
      border-left: 4px solid var(--gold);
      background: rgba(255, 253, 248, .82);
      color: var(--gold-deep);
      font-family:var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.5;
    }

    figcaption strong { color: var(--ink); }

    @container scope-map (max-width: 820px) {
      .reading {
        grid-template-columns: 132px minmax(0, 1fr);
        gap: 16px;
      }

      .reading-label strong {
        font-size: 20px;
      }

      .separated {
        grid-template-columns: minmax(0, 1fr) 52px minmax(0, 1fr);
      }

      .island {
        min-height: 116px;
        padding: 16px 14px;
        font-size: 13px;
        line-height: 1.3;
      }

      .island strong {
        font-size: 14px;
        line-height: 1.25;
      }

      .merged span {
        min-width: 0;
        min-height: 116px;
        padding: 14px 7px;
        font-size: 12px;
        line-height: 1.25;
        overflow-wrap: anywhere;
      }

      .layer {
        padding-inline: 16px;
        font-size: 13px;
        line-height: 1.3;
      }
    }

    @media (max-width: 860px) {
      main { width: min(100% - 20px, 620px); }

      .scope-map {
        padding: 24px 18px;
        border-radius: 24px;
      }

      header,
      .reading {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .field { gap: 38px; }

      .separated {
        grid-template-columns: 1fr;
        gap: 26px;
      }

      .later {
        width: 2px;
        height: 44px;
        justify-self: center;
      }

      .later::before,
      .later::after {
        top: auto;
        left: 50%;
        transform: translateX(-50%);
      }

      .later::before { top: 0; }
      .later::after { right: auto; bottom: 0; }

      .later span {
        top: 50%;
        left: 18px;
        transform: translateY(-50%);
      }

      .merged { grid-template-columns: 1fr; }

      .merged span {
        min-height: 68px;
        border-top: 1px dashed rgba(49, 95, 91, .38);
        border-left: 0;
      }

      .merged span:first-child { border-top: 0; }

      .layer:nth-child(1) { width: 82%; }
      .layer:nth-child(2) { width: 88%; margin-left: 5%; }
      .layer:nth-child(3) { width: 94%; margin-left: 10%; }
    }
  </style>
</head>
<body>
  <main>
    <figure class="scope-map" role="group" aria-labelledby="scope-title" aria-describedby="scope-caption">
      <header>
        <div>
          <p class="eyebrow">Сравнение без ловушки номера</p>
          <h1 id="scope-title">Номер совпадает. Объём — нет.</h1>
        </div>
        <p class="intro">В разных школах «третья ступень» может обозначать разную ширину подготовки. Схема показывает не рейтинг, а три способа собрать программу.</p>
      </header>

      <div class="field">
        <section class="reading" aria-labelledby="reading-one">
          <div class="reading-label">
            <small>Конструкция 01</small>
            <strong id="reading-one">Два самостоятельных этапа</strong>
          </div>
          <div class="shape separated">
            <div class="island personal">
              <strong>Личное мастерство</strong>
              <span>собственная практика и углубление метода</span>
            </div>
            <div class="later" aria-hidden="true"><span>позже</span></div>
            <div class="island teacher">
              <strong>Учительская подготовка</strong>
              <span>работа с учениками и право инициировать</span>
            </div>
          </div>
        </section>

        <section class="reading" aria-labelledby="reading-two">
          <div class="reading-label">
            <small>Конструкция 02</small>
            <strong id="reading-two">Один объединённый объём</strong>
          </div>
          <div class="shape merged" aria-label="Третья ступень объединяет личную практику, обучение передаче и право инициировать">
            <span>Личная мастерская практика</span>
            <span>Подготовка к передаче</span>
            <span>Право обучать и инициировать</span>
          </div>
        </section>

        <section class="reading" aria-labelledby="reading-three">
          <div class="reading-label">
            <small>Конструкция 03</small>
            <strong id="reading-three">Несколько нарастающих частей</strong>
          </div>
          <div class="shape layers" aria-label="Мастерский путь состоит из трёх последовательных частей">
            <div class="layer">A — личная практика</div>
            <div class="layer">B — работа с учениками</div>
            <div class="layer">C — право инициировать и готовить мастеров</div>
          </div>
        </section>
      </div>

      <figcaption id="scope-caption"><strong>Практический вывод:</strong> до выбора школы полезнее спросить, что входит в программу и какие права она даёт, чем сравнивать только количество ступеней.</figcaption>
    </figure>
  </main>
</body>
</html>
