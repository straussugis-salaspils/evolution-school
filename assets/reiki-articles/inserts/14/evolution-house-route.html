<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Линия Рейки Evolution House</title>
  <style>
    .eh-insert-preview {
      box-sizing: border-box;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background: #f8f0dc;
      color: #292319;
      font-family: var(--viz-font-body, "Segoe UI", system-ui, sans-serif);
    }

    .eh14route,
    .eh14route * {
      box-sizing: border-box;
    }

    .eh14route {
      --ink: #292319;
      --line: #82958a;
      --paper: #fbf8f0;
      --accent: #9a5f48;
      width: min(100%, 760px);
      max-width: calc(100vw - 32px);
      margin: 0;
      padding: clamp(24px, 5vw, 46px);
      overflow: hidden;
      border: 1px solid #d8d1c2;
      border-radius: 30px 8px 30px 8px;
      background:
        linear-gradient(110deg, transparent 0 62%, rgba(130, 149, 138, .08) 62% 100%),
        var(--paper);
      box-shadow: 0 20px 55px rgba(38, 53, 47, .08);
    }

    .eh14route__eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .eh14route__title {
      max-width: 580px;
      margin: 0;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(28px, 5vw, 45px);
      font-weight: 500;
      line-height: 1.02;
      letter-spacing: -.025em;
    }

    .eh14route__lead {
      max-width: 560px;
      margin: 14px 0 0;
      color: #59665f;
      font-size: clamp(14px, 2vw, 17px);
      line-height: 1.55;
    }

    .eh14route__line {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 18px;
      margin: 54px 0 8px;
      padding: 0;
      list-style: none;
    }

    .eh14route__line::before {
      content: "";
      position: absolute;
      top: 15px;
      left: 7%;
      right: 7%;
      height: 2px;
      background: var(--line);
    }

    .eh14route__stop {
      position: relative;
      min-width: 0;
      padding-top: 43px;
    }

    .eh14route__stop::before {
      content: "";
      position: absolute;
      z-index: 1;
      top: 7px;
      left: 50%;
      width: 16px;
      height: 16px;
      border: 5px solid var(--paper);
      border-radius: 50%;
      background: var(--ink);
      box-shadow: 0 0 0 2px var(--line);
      transform: translateX(-50%);
    }

    .eh14route__stop:nth-child(even) {
      transform: translateY(18px);
    }

    .eh14route__name {
      display: block;
      font-family: var(--viz-font-display, Georgia, "Times New Roman", serif);
      font-size: clamp(15px, 2vw, 19px);
      line-height: 1.08;
      text-align: center;
    }

    .eh14route__task {
      display: block;
      margin-top: 8px;
      color: #6f7b74;
      font-size: 11px;
      line-height: 1.35;
      text-align: center;
    }

    .eh14route__stop--third::before {
      background: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .eh14route__stop--third .eh14route__name {
      color: var(--accent);
    }

    .eh14route__note {
      width: fit-content;
      margin: 42px 0 0 auto;
      padding-top: 10px;
      border-top: 1px solid #c7bfb0;
      color: #6f5b50;
      font-size: 12px;
      line-height: 1.45;
    }

    .eh14route__sr {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 560px) {
      .eh14route {
        padding: 26px 22px 30px;
        border-radius: 24px 6px 24px 6px;
      }

      .eh14route__line {
        display: block;
        margin-top: 34px;
        padding-left: 32px;
      }

      .eh14route__line::before {
        top: 10px;
        bottom: 10px;
        left: 9px;
        right: auto;
        width: 2px;
        height: auto;
      }

      .eh14route__stop,
      .eh14route__stop:nth-child(even) {
        min-height: 70px;
        padding: 0 0 24px 18px;
        transform: none;
      }

      .eh14route__stop::before {
        top: 1px;
        left: -23px;
        transform: none;
      }

      .eh14route__name,
      .eh14route__task {
        text-align: left;
      }

      .eh14route__note {
        margin-top: 6px;
      }
    }
  </style>
</head>
<body class="eh-insert-preview">
<figure class="eh14route" role="group" aria-labelledby="eh14route-title" aria-describedby="eh14route-desc">
    <p class="eh14route__eyebrow">Evolution House</p>
    <h2 class="eh14route__title" id="eh14route-title">Одна линия. У каждой ступени — своя задача.</h2>
    <p class="eh14route__lead" id="eh14route-desc">Путь продолжается последовательно, но не превращает следующие этапы в пьедестал.</p>

    <ol class="eh14route__line" aria-label="Линия обучения Рейки">
      <li class="eh14route__stop">
        <span class="eh14route__name">Рейки I</span>
        <span class="eh14route__task">личная практика</span>
      </li>
      <li class="eh14route__stop">
        <span class="eh14route__name">Рейки II</span>
        <span class="eh14route__task">дополнительные инструменты</span>
      </li>
      <li class="eh14route__stop eh14route__stop--third">
        <span class="eh14route__name">Мастер жизни</span>
        <span class="eh14route__task">третья ступень · личное мастерство</span>
      </li>
      <li class="eh14route__stop">
        <span class="eh14route__name">Мастер-Учитель</span>
        <span class="eh14route__task">обучение и инициации</span>
      </li>
      <li class="eh14route__stop">
        <span class="eh14route__name">Многомерный Мастер</span>
        <span class="eh14route__task">собственный метод и система передачи</span>
      </li>
    </ol>

    <p class="eh14route__note">«Мастер жизни» — полноценная третья ступень.</p>
    <figcaption class="eh14route__sr">Горизонтальная карта линии Evolution House от Рейки I до Многомерного Мастера. Все точки равны по размеру и свету; отдельно отмечено, что Мастер жизни является третьей ступенью.</figcaption>
  </figure>
</body>
</html>
